name: terraform

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:

  terraform-plan:

    runs-on: ubuntu-latest

    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::139979204351:role/GitHubAction-AssumeRoleWithAction
          aws-region: us-east-1
          
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Security Scan
        uses: aquasecurity/tfsec-action@v1.0.0

      - name: Terraform Plan
        run: terraform plan

  manual-approval:
    name: manual approval
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: success()

    permissions:
      issues: write
      contents: read

    steps: 
      - name: Await for manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ThomasDDY
          minimum-approvals: 1 #specify the number of approvals needed
          issue-title: "Manual Approval Required for Terraform Apply"
          issue-body: "Please approve or deny the deployment."
          exclude-workflow-initiator-as-approver: false

  terraform-apply:

    runs-on: ubuntu-latest
    needs: manual-approval

    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::139979204351:role/GitHubAction-AssumeRoleWithAction
          aws-region: us-east-1
          
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v3

      - name: Initialiser Terraform
        run: terraform init 

      # - name: Terraform Apply
      #   run: terraform apply -auto-approve

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Test Placeholder
        run: echo "Run test_script.py here"